<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      height: 100vh;
      background: #f7f7f5;
    }

    /* Sidebar */
    #sidebar {
      width: 260px;
      background: #1c1c1e;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    #sidebar-header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid #2c2c2e;
    }

    #sidebar-header h1 {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 12px;
    }

    #search {
      width: 100%;
      padding: 7px 10px;
      border-radius: 8px;
      border: none;
      background: #2c2c2e;
      color: #fff;
      font-size: 13px;
      outline: none;
    }

    #search::placeholder { color: #666; }

    #notes-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .note-item {
      padding: 10px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.15s;
    }

    .note-item:hover { background: #232325; }

    .note-item.active {
      background: #2c2c2e;
      border-left: 3px solid #f5a623;
    }

    .note-item .note-title {
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .note-item .note-preview {
      color: #888;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .note-item .note-date {
      color: #555;
      font-size: 11px;
      margin-top: 4px;
    }

    #empty-list {
      color: #555;
      font-size: 13px;
      text-align: center;
      margin-top: 32px;
      display: none;
    }

    #sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid #2c2c2e;
    }

    #new-btn {
      width: 100%;
      padding: 10px 0;
      border-radius: 8px;
      border: none;
      background: #f5a623;
      color: #1c1c1e;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }

    #new-btn:hover { opacity: 0.9; }

    /* Editor */
    #editor-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #editor-header {
      display: flex;
      align-items: center;
      padding: 16px 28px;
      border-bottom: 1px solid #e5e5e3;
      background: #fff;
    }

    #note-title {
      flex: 1;
      font-size: 22px;
      font-weight: 700;
      border: none;
      outline: none;
      background: transparent;
      color: #1c1c1e;
    }

    #save-status {
      color: #aaa;
      font-size: 12px;
      margin-right: 16px;
    }

    #delete-btn {
      background: none;
      border: 1px solid #e5e5e3;
      color: #cc4444;
      border-radius: 7px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 13px;
    }

    #delete-btn:hover { background: #fff0f0; }

    #note-content {
      flex: 1;
      padding: 28px;
      font-size: 15px;
      line-height: 1.7;
      border: none;
      outline: none;
      resize: none;
      background: #f7f7f5;
      color: #2c2c2e;
      font-family: inherit;
    }

    /* Empty state */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #aaa;
    }

    #empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    #empty-state h2 { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
    #empty-state p { font-size: 14px; margin-bottom: 24px; }

    #empty-new-btn {
      padding: 10px 24px;
      border-radius: 8px;
      border: none;
      background: #f5a623;
      color: #1c1c1e;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>📝 Notes</h1>
      <input id="search" type="text" placeholder="Search..." oninput="renderList()" />
    </div>
    <div id="notes-list">
      <div id="empty-list">No notes yet</div>
    </div>
    <div id="sidebar-footer">
      <button id="new-btn" onclick="newNote()">+ New Note</button>
    </div>
  </div>

  <!-- Editor -->
  <div id="editor-area">
    <div id="editor-header" style="display:none;">
      <input id="note-title" type="text" placeholder="Note title" oninput="onEdit()" />
      <span id="save-status">Saved</span>
      <button id="delete-btn" onclick="deleteNote()">Delete</button>
    </div>
    <textarea id="note-content" placeholder="Start writing…" oninput="onEdit()" style="display:none;"></textarea>

    <div id="empty-state">
      <div class="icon">📝</div>
      <h2>No note selected</h2>
      <p>Pick one from the sidebar or create a new one</p>
      <button id="empty-new-btn" onclick="newNote()">+ New Note</button>
    </div>
  </div>

  <script>
    // ---------- Storage ----------
    function getNotes() {
      return JSON.parse(localStorage.getItem('notes') || '[]');
    }

    function saveNotes(notes) {
      localStorage.setItem('notes', JSON.stringify(notes));
    }

    // ---------- State ----------
    let selectedId = null;
    let saveTimer = null;

    // ---------- Init ----------
    renderList();

    // ---------- Render ----------
    function renderList() {
      const notes = getNotes();
      const query = document.getElementById('search').value.toLowerCase();
      const list = document.getElementById('notes-list');
      const emptyMsg = document.getElementById('empty-list');

      // Clear existing items (keep empty-list div)
      Array.from(list.querySelectorAll('.note-item')).forEach(el => el.remove());

      const filtered = notes.filter(n =>
        (n.title || '').toLowerCase().includes(query) ||
        (n.content || '').toLowerCase().includes(query)
      );

      emptyMsg.style.display = filtered.length === 0 ? 'block' : 'none';

      filtered.forEach(note => {
        const div = document.createElement('div');
        div.className = 'note-item' + (note.id === selectedId ? ' active' : '');
        div.onclick = () => selectNote(note.id);
        div.innerHTML = `
          <div class="note-title">${escHtml(note.title || 'Untitled')}</div>
          <div class="note-preview">${escHtml((note.content || 'No content').slice(0, 50))}</div>
          <div class="note-date">${formatDate(note.updatedAt)}</div>
        `;
        list.appendChild(div);
      });
    }

    // ---------- Select ----------
    function selectNote(id) {
      selectedId = id;
      const notes = getNotes();
      const note = notes.find(n => n.id === id);
      if (!note) return;

      document.getElementById('editor-header').style.display = 'flex';
      document.getElementById('note-content').style.display = 'block';
      document.getElementById('empty-state').style.display = 'none';

      document.getElementById('note-title').value = note.title || '';
      document.getElementById('note-content').value = note.content || '';
      document.getElementById('save-status').textContent = 'Saved';

      renderList();
    }

    // ---------- New ----------
    function newNote() {
      const notes = getNotes();
      const note = {
        id: Date.now().toString(),
        title: 'Untitled',
        content: '',
        updatedAt: new Date().toISOString()
      };
      notes.unshift(note);
      saveNotes(notes);
      selectNote(note.id);
    }

    // ---------- Edit / Autosave ----------
    function onEdit() {
      document.getElementById('save-status').textContent = 'Saving…';
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        const notes = getNotes();
        const idx = notes.findIndex(n => n.id === selectedId);
        if (idx === -1) return;
        notes[idx].title = document.getElementById('note-title').value;
        notes[idx].content = document.getElementById('note-content').value;
        notes[idx].updatedAt = new Date().toISOString();
        saveNotes(notes);
        document.getElementById('save-status').textContent = 'Saved';
        renderList();
      }, 600);
    }

    // ---------- Delete ----------
    function deleteNote() {
      if (!selectedId) return;
      if (!confirm('Delete this note?')) return;
      let notes = getNotes();
      notes = notes.filter(n => n.id !== selectedId);
      saveNotes(notes);
      selectedId = null;

      document.getElementById('editor-header').style.display = 'none';
      document.getElementById('note-content').style.display = 'none';
      document.getElementById('empty-state').style.display = 'flex';

      renderList();
    }

    // ---------- Helpers ----------
    function formatDate(str) {
      if (!str) return '';
      return new Date(str).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
